<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Game</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #game {
      width: 100vw;
      height: 100vh;
      background: url("bg.png") no-repeat center center;
      background-size: 1950px 1000px;
      position: relative;
    }

    #player {
      width: 30px;
      height: 29px;
      background: red;
      position: absolute;
      top: 200px;
      left: 200px;
    }
  </style>
</head>

<body>

  <div id="game">
    <div id="player"></div>
  </div>

  <script>
    const game = document.getElementById("game");
    const player = document.getElementById("player");

    let playerX = 200;
    let playerY = 200;

    let targetX = playerX;
    let targetY = playerY;

    const speed = 5;

    // click position relative to game
    document.addEventListener("click", (e) => {
      const rect = game.getBoundingClientRect();

      targetX = e.clientX - rect.left;
      targetY = e.clientY - rect.top;
    });

    function update() {
      let dx = targetX - playerX;
      let dy = targetY - playerY;

      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > 2) {
        dx /= dist;
        dy /= dist;

        playerX += dx * speed;
        playerY += dy * speed;
      }

      // keep player inside game bounds
      playerX = Math.max(0, Math.min(game.clientWidth - 30, playerX));
      playerY = Math.max(0, Math.min(game.clientHeight - 30, playerY));

      player.style.left = playerX + "px";
      player.style.top = playerY + "px";

      requestAnimationFrame(update);
    }

    update();
  </script>

</body>
</html>
